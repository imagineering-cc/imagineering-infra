services:
  bot:
    build:
      context: ./src
    container_name: dreamfinder
    restart: unless-stopped
    ports:
      - "8081:8081"
    networks:
      - imagineering
    environment:
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN:-}
      - MATRIX_HOMESERVER=${MATRIX_HOMESERVER:-https://matrix.imagineering.cc}
      - MATRIX_ACCESS_TOKEN=${MATRIX_ACCESS_TOKEN}
      - KAN_BASE_URL=${KAN_BASE_URL:-https://kan.imagineering.cc/api/v1}
      - KAN_API_KEY=${KAN_API_KEY}
      - OUTLINE_BASE_URL=${OUTLINE_BASE_URL:-https://outline.imagineering.cc/api}
      - OUTLINE_API_KEY=${OUTLINE_API_KEY:-}
      - RADICALE_BASE_URL=${RADICALE_BASE_URL:-https://dav.imagineering.cc}
      - RADICALE_URL=${RADICALE_BASE_URL:-https://dav.imagineering.cc}
      - RADICALE_USERNAME=${RADICALE_USERNAME:-pm-agent}
      - RADICALE_PASSWORD=${RADICALE_PASSWORD}
      - PLAYWRIGHT_ENABLED=${PLAYWRIGHT_ENABLED:-false}
      - BOT_NAME=${BOT_NAME:-Dreamfinder}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - API_KEY=${API_KEY}
      - VOYAGE_API_KEY=${VOYAGE_API_KEY:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - LIVEKIT_URL=${LIVEKIT_URL:-}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:-}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:-}
      - ADMIN_IDS=${ADMIN_IDS:-}
      - MATRIX_ALWAYS_RESPOND_ROOMS=${MATRIX_ALWAYS_RESPOND_ROOMS:-}
      # Bridge appservice bots excluded from DM member counting (portal rooms
      # carry the bridge bot as an extra member). All four MXIDs verified
      # against the live bridge registrations (2026-06-11). Also keeps the
      # bot from treating bridge MANAGEMENT rooms (bot + bridge bot) as DMs.
      - BRIDGE_BOT_IDS=${BRIDGE_BOT_IDS:-@whatsappbot:imagineering.cc,@signalbot:imagineering.cc,@telegrambot:imagineering.cc,@discordbot:imagineering.cc}
      # River's per-platform bridge management rooms — each one configured
      # adds that platform to start_private_chat's enum (dreamfinder#103:
      # config presence IS platform existence). River has its own bridge
      # login on WhatsApp, Telegram and Signal (Signal linked 2026-06-12 as a
      # device of the +61461488770 account — River absorbs that identity; the
      # human-vs-AI distinction lives in a per-message emoji prefix 🤖/🧑, not
      # a separate account). Discord stays unset until River has its own
      # Discord account (river@imagineering.cc — Nick's hands).
      - WHATSAPP_MANAGEMENT_ROOM=${WHATSAPP_MANAGEMENT_ROOM:-!JUo0oTBHrPUJOq76WrqjAO3Ioc6rbT4cOujGUPxJPc4}
      - TELEGRAM_MANAGEMENT_ROOM=${TELEGRAM_MANAGEMENT_ROOM:-!xJfXtfQlhHWzgxxTaxRVFcCp6BDjikWjysvB4xrxGyU}
      # SIGNAL parked dark 2026-06-12: River's login linked + room ready
      # (!N5PcCDLZSPgkkHNAU05ZFa_WCjcSoij2QMD6-0olOyc) but two bugs block delivery —
      # (1) start_private_chat sends UNPREFIXED `start-chat`, which mautrix-signal
      # rejects (needs `!signal ` prefix); (2) River's signal login fails contact
      # discovery ("websocket is nil"). Re-enable only after both are fixed +
      # verified e2e. See claude-tasks #1/#3.
      # - SIGNAL_MANAGEMENT_ROOM=${SIGNAL_MANAGEMENT_ROOM:-!N5PcCDLZSPgkkHNAU05ZFa_WCjcSoij2QMD6-0olOyc}
      - CALENDAR_URL=${CALENDAR_URL:-}
      - EVENT_TIMEZONE=${EVENT_TIMEZONE:-}
      - DEPLOY_ANNOUNCE_GROUP_ID=${DEPLOY_ANNOUNCE_GROUP_ID:-}
      # Matrix portal room for the Imagineering Telegram group. When set, River
      # posts the weekly "session starts in 5 minutes" reminder there every
      # Saturday 14:55 Australia/Melbourne (venue alternates online/in-person).
      # Empty until River's Telegram account (+61461488770) joins the group and
      # the mautrix-telegram bridge creates the portal room. See claude-tasks #23.
      - EVENT_REMINDER_ROOM_ID=${EVENT_REMINDER_ROOM_ID:-}
      - HEALTH_PORT=8081
    volumes:
      - bot_data:/app/data

volumes:
  bot_data:

# Shared network allows text brain to be reachable by voice brain
networks:
  imagineering:
    external: true
