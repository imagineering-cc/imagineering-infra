services:
  migrate:
    image: ghcr.io/kanbn/kan-migrate:latest
    container_name: img-kanbn-migrate
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - POSTGRES_URL=postgres://kanbn:${POSTGRES_PASSWORD}@postgres:5432/kanbn
    networks:
      - kanbn

  kanbn:
    image: ghcr.io/kanbn/kan:latest
    container_name: img-kanbn
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      - NEXT_PUBLIC_BASE_URL=${KANBN_URL}
      - BETTER_AUTH_SECRET=${AUTH_SECRET}
      - POSTGRES_URL=postgres://kanbn:${POSTGRES_PASSWORD}@postgres:5432/kanbn
      - NEXT_PUBLIC_ALLOW_CREDENTIALS=true
      - NEXT_PUBLIC_DISABLE_SIGN_UP=false
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_SECURE=false
      - EMAIL_FROM=${SMTP_FROM_EMAIL}
      - TRELLO_APP_API_KEY=${TRELLO_API_KEY}
      - TRELLO_APP_API_SECRET=${TRELLO_API_SECRET}
      # S3/MinIO storage for attachments
      - S3_REGION=us-east-1
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}
      - S3_FORCE_PATH_STYLE=true
      - NEXT_PUBLIC_STORAGE_URL=${NEXT_PUBLIC_STORAGE_URL}
      - NEXT_PUBLIC_AVATAR_BUCKET_NAME=kanbn-avatars
      - NEXT_PUBLIC_ATTACHMENTS_BUCKET_NAME=kanbn-attachments
      - S3_AVATAR_UPLOAD_LIMIT=10485760
    ports:
      - "3013:3000"
    networks:
      - kanbn

  postgres:
    image: postgres:15-alpine
    container_name: img-kanbn-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=kanbn
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=kanbn
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kanbn -d kanbn"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - kanbn

volumes:
  postgres_data:

networks:
  kanbn:
