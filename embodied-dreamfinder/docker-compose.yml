services:
  app:
    build:
      context: ./src
    container_name: embodied-dreamfinder
    restart: unless-stopped
    ports:
      - "3015:3000"
    networks:
      - imagineering
    environment:
      - AUTH_PASSWORD=${AUTH_PASSWORD:-}
      - AUTH_SECRET=${AUTH_SECRET:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - KAN_BASE_URL=${KAN_BASE_URL:-https://kan.imagineering.cc/api/v1}
      - KAN_API_KEY=${KAN_API_KEY}
      - KAN_BOARD_ID=${KAN_BOARD_ID}
      - OUTLINE_BASE_URL=${OUTLINE_BASE_URL:-https://outline.imagineering.cc/api}
      - OUTLINE_API_KEY=${OUTLINE_API_KEY:-}
      - RADICALE_CALENDAR_URL=${RADICALE_CALENDAR_URL:-}
      - RADICALE_USERNAME=${RADICALE_USERNAME:-}
      - RADICALE_PASSWORD=${RADICALE_PASSWORD:-}
      - DREAMFINDER_API_URL=${DREAMFINDER_API_URL:-http://dreamfinder:8081}
      - DREAMFINDER_API_KEY=${DREAMFINDER_API_KEY:-}
      - LIVEKIT_URL=${LIVEKIT_URL:-wss://livekit.imagineering.cc}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:-}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:-}
      - AVATAR_STREAM_ENABLED=true
      - PORT=3000
      - VOICE_MODE=${VOICE_MODE:-realtime}
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN:-}
      # Stage selectors — engine concepts (STT → BRAIN → TTS), one env var per
      # stage. NO defaults here on purpose: the pipeline is fail-closed (an
      # unset/unknown selector crashes the boot with a named error) and a
      # compose-level default would silently mask a missing .env line — the
      # VOICE_MODE=realtime silent-substrate-switch class.
      - STT=${STT}
      - BRAIN=${BRAIN}
      - BRAIN_MODEL=${BRAIN_MODEL}
      - TTS=${TTS}
      - WHISPER_CLI=/opt/whisper/bin/whisper-cli
      - WHISPER_MODEL=/opt/whisper/models/ggml-base.en.bin
      - PIPER_BIN=/opt/piper/piper
      - PIPER_VOICE=${PIPER_VOICE:-/opt/piper/voices/en_US-lessac-high.onnx}
      - KOKORO_PYTHON=python3
      - KOKORO_SCRIPT=/app/kokoro-tts.py
      - KOKORO_VOICE=${KOKORO_VOICE:-bm_fable}
      - KOKORO_MODEL_DIR=/opt/kokoro
      - LD_LIBRARY_PATH=/opt/whisper/lib:/opt/whisper/ggml-lib
      # ascend night-loop: bearer for POST /api/ascend/night + where the stored night persists.
      # ASCEND_NIGHT_FILE points at the writable named volume below so the night survives a redeploy
      # (it's also fine to lose — ascend re-delivers every morning — but a same-day restart keeps it).
      - ASCEND_INGEST_KEY=${ASCEND_INGEST_KEY:-}
      - ASCEND_NIGHT_FILE=/data/last-night.json
      # Second password scoping a session to "ascend" — unlocks the DF that knows last night
      # (AUTH_PASSWORD alone gives plain "base" DF, blind to it). See server.js /auth/login.
      - ASCEND_PASSWORD=${ASCEND_PASSWORD:-}
      # Shared secret letting the in-container LiveKit voice agent request ascend-scoped
      # context over localhost (server.js localhost override). Server + agent share this
      # container env, so one value serves both. <16 chars → override disabled (fail-closed).
      - INTERNAL_SCOPE_KEY=${INTERNAL_SCOPE_KEY:-}
    volumes:
      - embodied-dreamfinder-data:/data
      - /home/nick/whisper.cpp/build/bin:/opt/whisper/bin:ro
      - /home/nick/whisper.cpp/build/src:/opt/whisper/lib:ro
      - /home/nick/whisper.cpp/build/ggml/src:/opt/whisper/ggml-lib:ro
      - /home/nick/whisper.cpp/models:/opt/whisper/models:ro
      - /home/nick/piper:/opt/piper:ro
      - /home/nick/kokoro:/opt/kokoro:ro
      # NOTE: the lyra-live ssh deploy key is intentionally NOT mounted here.
      # It is added by docker-compose.lyra.yml only when DF_BRAIN=lyra-live, so
      # the default (api) container never holds the key. See that file + the
      # DF_BRAIN comment above (cage-match #81 finding 1).

# Shared network allows voice brain to reach text brain (dreamfinder:8081)
networks:
  imagineering:
    external: true

# Persists the ascend night across container recreation (redeploys rebuild the container).
volumes:
  embodied-dreamfinder-data:
