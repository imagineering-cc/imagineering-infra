services:
  signal-api:
    image: bbernhard/signal-cli-rest-api:0.97
    container_name: imagineering-signal-api
    restart: unless-stopped
    environment:
      - MODE=json-rpc
    volumes:
      - signal_data:/home/.local/share/signal-cli

  bot:
    build:
      context: ./src
    container_name: imagineering-pm-bot
    restart: unless-stopped
    depends_on:
      - signal-api
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - SIGNAL_API_URL=http://signal-api:8080
      - SIGNAL_PHONE_NUMBER=${SIGNAL_PHONE_NUMBER}
      - KAN_BASE_URL=${KAN_BASE_URL:-https://kan.imagineering.cc/api/v1}
      - KAN_API_KEY=${KAN_API_KEY}
      - OUTLINE_BASE_URL=${OUTLINE_BASE_URL:-https://outline.imagineering.cc/api}
      - OUTLINE_API_KEY=${OUTLINE_API_KEY:-}
      - RADICALE_BASE_URL=${RADICALE_BASE_URL:-https://dav.imagineering.cc}
      - RADICALE_USERNAME=${RADICALE_USERNAME:-pm-agent}
      - RADICALE_PASSWORD=${RADICALE_PASSWORD}
      - PLAYWRIGHT_ENABLED=${PLAYWRIGHT_ENABLED:-false}
      - BOT_NAME=${BOT_NAME:-Dreamfinder}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - bot_data:/app/data

volumes:
  signal_data:
  bot_data:
