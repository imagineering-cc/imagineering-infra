services:
  continuwuity:
    image: forgejo.ellis.link/continuwuation/continuwuity:latest
    restart: always
    ports:
      - "8008:6167"   # Client API
    environment:
      CONTINUWUITY_SERVER_NAME: ${MATRIX_SERVER_NAME}
      CONTINUWUITY_DATABASE_PATH: /var/lib/continuwuity
      # Enables `!admin server backup-database` (RocksDB online checkpoint via
      # hardlinks of SST files). Lives in a separate volume from the live
      # database so the backup script can read it without touching the
      # running RocksDB tree. The nightly /opt/scripts/backup.sh reads from
      # the matrix_continuwuity_backups volume and prunes after tarring.
      CONTINUWUITY_DATABASE_BACKUP_PATH: /var/lib/continuwuity-backups
      CONTINUWUITY_PORT: "6167"
      CONTINUWUITY_ADDRESS: "0.0.0.0"
      CONTINUWUITY_ALLOW_REGISTRATION: "true"
      CONTINUWUITY_REGISTRATION_TOKEN: ${REGISTRATION_TOKEN}
      CONTINUWUITY_ALLOW_FEDERATION: "true"
      CONTINUWUITY_MAX_REQUEST_SIZE: "20971520"
      CONTINUWUITY_NEW_USER_DISPLAYNAME_SUFFIX: ""
      CONTINUWUITY_LOG: "info"
    volumes:
      - continuwuity_data:/var/lib/continuwuity
      - continuwuity_backups:/var/lib/continuwuity-backups
    ulimits:
      nofile:
        soft: 1048567
        hard: 1048567

  mautrix-telegram:
    image: dock.mau.dev/mautrix/telegram:latest
    restart: always
    volumes:
      - telegram_data:/data
    depends_on:
      - continuwuity

  mautrix-discord:
    image: dock.mau.dev/mautrix/discord:latest
    restart: always
    volumes:
      - discord_data:/data
    depends_on:
      - continuwuity

  mautrix-signal:
    image: dock.mau.dev/mautrix/signal:latest
    restart: always
    volumes:
      - signal_data:/data
    depends_on:
      - continuwuity

  mautrix-whatsapp:
    image: dock.mau.dev/mautrix/whatsapp:latest
    restart: always
    volumes:
      - whatsapp_data:/data
    depends_on:
      - continuwuity

  relay-bot:
    build: ./relay
    restart: always
    environment:
      RELAY_HOMESERVER_URL: http://continuwuity:6167
      RELAY_DOMAIN: ${MATRIX_SERVER_NAME}
      RELAY_AS_TOKEN: ${RELAY_AS_TOKEN}
      RELAY_HS_TOKEN: ${RELAY_HS_TOKEN}
      RELAY_PORTAL_ROOMS: ${PORTAL_ROOMS:-}
      RELAY_HUB_ROOM_ID: ${HUB_ROOM_ID}
      RELAY_DB_PATH: /data/relay.db
      RELAY_LOG_LEVEL: ${RELAY_LOG_LEVEL:-INFO}
      RELAY_DOUBLE_PUPPETS: ${RELAY_DOUBLE_PUPPETS:-}
    volumes:
      - relay_data:/data
    depends_on:
      - continuwuity

  relay-bot-hf:
    build: ./relay
    restart: always
    environment:
      RELAY_HOMESERVER_URL: http://continuwuity:6167
      RELAY_DOMAIN: ${MATRIX_SERVER_NAME}
      RELAY_AS_TOKEN: ${HF_RELAY_AS_TOKEN}
      RELAY_HS_TOKEN: ${HF_RELAY_HS_TOKEN}
      RELAY_PORTAL_ROOMS: ${HF_PORTAL_ROOMS:-}
      RELAY_HUB_ROOM_ID: ${HF_HUB_ROOM_ID}
      RELAY_BOT_LOCALPART: relay-bot-hf
      RELAY_PUPPET_PREFIX: _relayhf_
      RELAY_DB_PATH: /data/relay.db
      RELAY_LOG_LEVEL: ${RELAY_LOG_LEVEL:-INFO}
      RELAY_DOUBLE_PUPPETS: ""
    volumes:
      - relay_hf_data:/data
    depends_on:
      - continuwuity

  # --- aiko-bridge: Matrix <-> aiko_chat (Aiko Services / MQTT) -------------
  # Source is the matrix/aiko-bridge submodule (github.com/nickmeinhold/aiko-chat-bridge).
  # Config + registration + db live server-side in ./aiko-bridge-data (gitignored),
  # generated/registered once per the bridge README (like the other mautrix bridges).
  aiko-mosquitto:
    image: eclipse-mosquitto:2
    restart: always
    volumes:
      - ./aiko-bridge/deploy/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - aiko_mosquitto_data:/mosquitto/data

  aiko-registrar:
    build: ./aiko-bridge
    image: aiko-bridge:latest
    restart: always
    environment:
      AIKO_MQTT_HOST: aiko-mosquitto
      AIKO_NAMESPACE: aiko
    command: ["aiko_registrar"]
    depends_on:
      - aiko-mosquitto

  aiko-chat:
    image: aiko-bridge:latest
    restart: always
    environment:
      AIKO_MQTT_HOST: aiko-mosquitto
      AIKO_NAMESPACE: aiko
    # geekscape/aiko_chat bootstraps its HyperSpace (channels/users) before
    # `aiko_chat run`; chat_start.sh does that idempotently from its working dir.
    command: ["bash", "-c", "cd /tmp && exec bash /opt/aiko_chat/src/aiko_chat/chat_start.sh"]
    depends_on:
      - aiko-registrar

  aiko-bridge:
    image: aiko-bridge:latest
    restart: always
    environment:
      AIKO_MQTT_HOST: aiko-mosquitto
      AIKO_NAMESPACE: aiko
    command: ["python", "-m", "aiko_bridge", "-c", "/data/config.yaml"]
    volumes:
      - ./aiko-bridge-data:/data
    depends_on:
      - aiko-chat
      - aiko-registrar
      - continuwuity

volumes:
  continuwuity_data:
  continuwuity_backups:
  telegram_data:
  discord_data:
  signal_data:
  whatsapp_data:
  relay_data:
  relay_hf_data:
  aiko_mosquitto_data:
